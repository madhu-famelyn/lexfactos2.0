app = "lexfactos2-0"
primary_region = "bom"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[processes]
  app = ".venv/bin/python -m uvicorn main:app --host 0.0.0.0 --port 8000"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
